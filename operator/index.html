<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Template · Bootstrap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <meta name="author" content="">

  <!-- Le styles -->
  <link href="css/bootstrap.css" rel="stylesheet">
  <style type="text/css">
    body {
      padding-top: 20px;
      padding-bottom: 60px;
    }

    .navbar {
      width: 500px;
      margin: auto
    }

    /* Custom container */
    .container {
      margin: 0 auto;
      max-width: 1000px;
    }

    .container>hr {
      margin: 60px 0;
    }

    /* Main marketing message and sign up button */
    .jumbotron {
      margin: 80px 0;
      text-align: center;
    }

    .jumbotron h1 {
      font-size: 100px;
      line-height: 1;
    }

    .jumbotron .lead {
      font-size: 24px;
      line-height: 1.25;
    }

    .jumbotron .btn {
      font-size: 21px;
      padding: 14px 24px;
    }

    /* Customize the navbar links to be fill the entire space of the .navbar */
    .navbar .navbar-inner {
      padding: 0;
    }

    .navbar .nav {
      margin: 0;
      display: table;
      width: 100%;
    }

    .navbar .nav li {
      display: table-cell;
      width: 1%;
      float: none;
    }

    .navbar .nav li a {
      font-weight: bold;
      text-align: center;
      border-left: 1px solid rgba(255, 255, 255, .75);
      border-right: 1px solid rgba(0, 0, 0, .1);
    }

    .navbar .nav li:first-child a {
      border-left: 0;
      border-radius: 3px 0 0 3px;
    }

    .navbar .nav li:last-child a {
      border-right: 0;
      border-radius: 0 3px 3px 0;
    }
  </style>
  <script>
    function quickPush() {
      fetch('api/pwr?hold=200')
        .then(response => {
          const button = document.getElementById('quickPush');
          if (!response.ok) {
            throw new Error('Network response was not ok');
            button.innerText = `This shouldn't happen, try again? (TURN SERVER ON)`;
          }
          button.innerText = 'Server turned on!';
          return response.text();
        })
        .then(data => console.log(data))
        .catch(error => console.error('Error:', error));
    }

    function longPush() {
      fetch('api/pwr?hold=6000')
        .then(response => {
          const button = document.getElementById('longPush');
          if (!response.ok) {
            throw new Error('Network response was not ok');
            button.innerText = `This shouldn't happen, try again? (LONGPUSH)`;
          }
          button.innerText = 'Server turned off!';
          return response.text();
        })
        .then(data => console.log(data))
        .catch(error => console.error('Error:', error));
    }
    function reset() {
      fetch('api/rst?hold=200')
        .then(response => {
          const button = document.getElementById('reset');
          if (!response.ok) {
            throw new Error('Network response was not ok');
            button.innerText = `This shouldn't happen, try again? (RESET)`;
          }
          button.innerText = 'Server reset!';
          return response.text();
        })
        .then(data => console.log(data))
        .catch(error => console.error('Error:', error));
    }
  </script>
</head>

<body>

  <div class="container">
    <!-- Jumbotron -->
    <div class="jumbotron">
      <h1>ESPWR</h1>
      <p class="lead">Control your ESP32 GPIO pins via HTTP requests.</p>
      <div class="navbar">
        <div class="navbar-inner">
          <div class="container">
            <ul class="nav">
              <li><a href="#">Home</a></li>
              <li><a href="./advanced.html">ADVANCED CONTROL</a></li>
            </ul>
          </div>
        </div>
      </div>
      <div style="margin: 10px;">
        <button id="quickPush" class="btn btn-large btn-primary" onclick="quickPush()">Push power button</button>
      </div>
      <div style="margin: 10px;">
        <button id="longPush" class="btn btn-large btn-warning" onclick="longPush()">Push power and hold for 6s</button>
      </div>
      <div>
        <button id="reset" class="btn btn-large btn-danger" onclick="reset()">Push reset button</button>
      </div>
    </div>


</body>

</html>
